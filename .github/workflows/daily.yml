name: daily-book-post

on:
  schedule:
    # 22:50 UTC = 日本時間 07:50。混雑する毎時00分を避けて発火の確実性を上げる。
    # GitHub のスケジュールはベストエフォートで数分〜十数分遅れることがある（8時前後に着地する想定）。
    - cron: "50 22 * * *"
  workflow_dispatch: {}   # 手動実行ボタン（テスト用）

permissions:
  contents: write          # posted.log をコミットして履歴を残すため

concurrency:
  group: daily-book-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (webp→png)
        run: pip install --quiet pillow

      - name: Post a book to Slack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-8' }}
        run: python post_book.py

      - name: Persist posted history
        run: |
          if [[ -n "$(git status --porcelain posted.log)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add posted.log
            git commit -m "chore: update posted.log [skip ci]"
            git push
          fi

# registered after actions enabled
