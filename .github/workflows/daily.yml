name: daily-book-post

on:
  # 定時トリガは外部cron（cron-job.org）→ workflow_dispatch を主とする。
  # cron-job.org 側で 平日 23:10 UTC（=8:10 JST）に dispatch API を叩く。
  # GitHub純正 schedule は当リポジトリで発火しない実績があるため使わない（履歴: 90858c6 参照）。
  workflow_dispatch: {}    # 手動実行 / 外部cronトリガ用

permissions:
  contents: write          # posted.log をコミットして履歴を残すため

concurrency:
  group: daily-book-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (webp→png)
        run: pip install --quiet pillow

      - name: Post a book
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_TARGETS: ${{ vars.NOTIFY_TARGETS || 'slack' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          # 2つ目のワークスペース（例: rechain-inc）。未設定なら1つ目だけに投稿。
          SLACK_BOT_TOKEN_2: ${{ secrets.SLACK_BOT_TOKEN_2 }}
          SLACK_CHANNEL_2: ${{ secrets.SLACK_CHANNEL_2 }}
          WECHAT_PROVIDER: ${{ vars.WECHAT_PROVIDER || 'wxpusher' }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-8' }}
        run: python post_book.py

      - name: Persist posted history
        run: |
          if [[ -n "$(git status --porcelain posted.log)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add posted.log
            git commit -m "chore: update posted.log [skip ci]"
            git push
          fi
