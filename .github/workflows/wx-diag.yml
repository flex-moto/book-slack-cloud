name: wx-diag
on:
  workflow_dispatch: {}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Identify subscriber
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          token=os.environ.get("WXPUSHER_APP_TOKEN","").strip()
          cfg=[u.strip() for u in os.environ.get("WXPUSHER_UIDS","").split(",") if u.strip()]
          url=f"https://wxpusher.zjiecode.com/api/fun/wxuser/v2?appToken={token}&page=1&pageSize=100"
          with urllib.request.urlopen(url,timeout=30) as r: res=json.load(r)
          recs=(res.get("data") or {}).get("records") or []
          def mnick(n):
              n=n or ""
              if len(n)<=2: return (n[:1]+"*") if n else "(空)"
              return n[0]+"*"*(len(n)-2)+n[-1]
          print(f"[diag] 購読者数: {len(recs)}")
          for rec in recs:
              uid=rec.get("uid","")
              print(f"[diag] uid末尾={uid[-4:]} nick={mnick(rec.get('nickName'))} 登録日時={rec.get('createTime')}")
          for u in cfg:
              print(f"[diag] 設定uid末尾={u[-4:]}")
          PY
