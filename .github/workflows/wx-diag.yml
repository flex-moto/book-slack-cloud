name: wx-diag
on:
  workflow_dispatch: {}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check WxPusher subscription of configured UIDs
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          token=os.environ.get("WXPUSHER_APP_TOKEN","").strip()
          cfg=[u.strip() for u in os.environ.get("WXPUSHER_UIDS","").split(",") if u.strip()]
          def mask(u): return (u[:4]+"…"+u[-4:]) if len(u)>8 else "****"
          subs={}
          page=1
          total=None
          while True:
              url=f"https://wxpusher.zjiecode.com/api/fun/wxuser/v2?appToken={token}&page={page}&pageSize=100"
              with urllib.request.urlopen(url,timeout=30) as r:
                  res=json.load(r)
              if res.get("code")!=1000:
                  print("[ERR] user list API:", res.get("code"), res.get("msg")); break
              d=res.get("data") or {}
              total=d.get("total")
              recs=d.get("records") or []
              for rec in recs:
                  uid=rec.get("uid")
                  if uid: subs[uid]=rec.get("createTime")
              if len(recs)<100: break
              page+=1
              if page>20: break
          print(f"[diag] このアプリの購読者総数: {total}  取得済み: {len(subs)}")
          print(f"[diag] 設定UID数: {len(cfg)}")
          for u in cfg:
              print(f"[diag] 設定UID {mask(u)} -> 購読リストに存在: {u in subs}")
          # 参考: 購読者UIDの末尾4桁一覧（照合用）
          print("[diag] 購読者UID(末尾4桁):", sorted({s[-4:] for s in subs}))
          PY
